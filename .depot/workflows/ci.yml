name: Repro proto install zarf failure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup proto
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          proto-version: "0.50.5"

      - name: Verify tools
        run: |
          zarf version
          go version
          moon --version
          terraform version
          kind version
