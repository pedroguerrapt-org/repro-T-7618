name: Repro proto install zarf failure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup proto
        uses: moonrepo/setup-toolchain@v0

      - name: Debug config
        run: |
          cat .prototools
          proto debug config

      - name: Install zarf
        run: proto install zarf 0.74.0

      - name: Verify zarf
        run: zarf version
