name: Repro proto install zarf failure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Start tcpdump
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq tcpdump
          sudo tcpdump -i any -w /tmp/proto-install.pcap \
            'tcp port 443 or tcp port 982' \
            -s 0 &
          echo $! > /tmp/tcpdump.pid
          sleep 1

      - name: Setup proto toolchain
        id: proto
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: false

      - name: Verify tools
        run: |
          zarf version
          go version
          moon --version
          terraform version
          kind version

      - name: Network and proxy diagnostics
        if: failure()
        run: |
          echo "=== SOCKS proxy status (port 982) ==="
          ss -tlnp | grep 982 || echo "Nothing listening on port 982"

          echo ""
          echo "=== Proxy environment variables ==="
          env | grep -iE '(proxy|socks|all_proxy|no_proxy)' | sort || echo "No proxy vars set"

          echo ""
          echo "=== Connectivity test: SOCKS proxy ==="
          curl -vsSL --connect-timeout 5 --max-time 10 \
            --socks5 127.0.0.1:982 \
            -o /dev/null https://github.com 2>&1 || true

          echo ""
          echo "=== Connectivity test: direct (no proxy) ==="
          curl -vsSL --connect-timeout 5 --max-time 10 \
            --noproxy '*' \
            -o /dev/null https://github.com 2>&1 || true

          echo ""
          echo "=== Connectivity test: oci.miren.cloud via SOCKS ==="
          curl -vsSL --connect-timeout 5 --max-time 10 \
            --socks5 127.0.0.1:982 \
            -o /dev/null https://oci.miren.cloud/v2/ 2>&1 || true

          echo ""
          echo "=== DNS resolution ==="
          for host in github.com oci.miren.cloud; do
            echo "--- $host ---"
            dig +short "$host" || nslookup "$host" || echo "DNS lookup failed"
          done

          echo ""
          echo "=== Route table ==="
          ip route show

          echo ""
          echo "=== Listening sockets ==="
          ss -tlnp

      - name: Debug failure
        if: failure()
        run: |
          echo "=== Proto error logs ==="
          find . /home/runner -maxdepth 3 -name "*.log" -newer /tmp/tcpdump.pid 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done

          echo ""
          echo "=== Retry failed tools with curl -v ==="
          for tool in zarf python go moon buf terraform actionlint hadolint grafanactl kind clusterctl yq pint sloth golangci-lint; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "--- $tool not found, attempting download ---"
              case "$tool" in
                zarf)     url="https://github.com/zarf-dev/zarf/releases/download/v0.74.0/zarf_v0.74.0_Linux_amd64" ;;
                python)   url="https://github.com/indygreg/python-build-standalone/releases/download/20260320/cpython-3.14.3+20260320-x86_64-unknown-linux-gnu-install_only.tar.gz" ;;
                go)       url="https://go.dev/dl/go1.26.1.linux-amd64.tar.gz" ;;
                *)        url="" ;;
              esac
              if [ -n "$url" ]; then
                echo "Trying: $url"
                curl -vsSL --connect-timeout 10 --max-time 30 -o /dev/null "$url" 2>&1 | head -40
              fi
            fi
          done

      - name: Analyze pcap on failure
        if: failure()
        run: |
          sudo kill "$(cat /tmp/tcpdump.pid)" 2>/dev/null || true
          sleep 2
          sudo apt-get install -yqq tshark

          pcap=/tmp/proto-install.pcap
          echo "=== Pcap summary ==="
          capinfos "$pcap"

          echo ""
          echo "=== TCP conversations ==="
          tshark -r "$pcap" -q -z conv,tcp

          echo ""
          echo "=== HTTP/2 requests and responses ==="
          tshark -r "$pcap" -Y "http2.headers" -T fields \
            -e frame.number -e frame.time_relative \
            -e ip.dst -e http2.headers.method -e http2.headers.path \
            -e http2.headers.status -e http2.header.value \
            -E header=y -E separator='  '

          echo ""
          echo "=== TLS handshake SNI values ==="
          tshark -r "$pcap" -Y "tls.handshake.extensions_server_name" -T fields \
            -e frame.number -e ip.dst -e tls.handshake.extensions_server_name \
            -E header=y -E separator='  '

          echo ""
          echo "=== TCP RST packets ==="
          tshark -r "$pcap" -Y "tcp.flags.reset==1" -T fields \
            -e frame.number -e frame.time_relative \
            -e ip.src -e ip.dst -e tcp.srcport -e tcp.dstport \
            -E header=y -E separator='  '

          echo ""
          echo "=== TCP retransmissions ==="
          tshark -r "$pcap" -Y "tcp.analysis.retransmission" -T fields \
            -e frame.number -e frame.time_relative \
            -e ip.src -e ip.dst -e tcp.srcport -e tcp.dstport \
            -E header=y -E separator='  '

          echo ""
          echo "=== SOCKS proxy traffic (port 982) ==="
          tshark -r "$pcap" -Y "tcp.port==982" -T fields \
            -e frame.number -e frame.time_relative \
            -e ip.src -e ip.dst -e tcp.srcport -e tcp.dstport \
            -e tcp.flags.str \
            -E header=y -E separator='  ' || echo "No SOCKS traffic captured"

          echo ""
          echo "=== Failed TCP connections (SYN without SYN-ACK) ==="
          tshark -r "$pcap" -q -z conv,tcp | grep -E '<->' | awk '$8 == 0 || $4 <= 2' || echo "None found"

          echo ""
          echo "=== Expert info (errors and warnings) ==="
          tshark -r "$pcap" -q -z expert,error
          tshark -r "$pcap" -q -z expert,warn

      - name: Stop tcpdump on success
        if: success()
        run: sudo kill "$(cat /tmp/tcpdump.pid)" 2>/dev/null || true
