name: Repro proto install zarf failure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Start tcpdump
        run: |
          sudo tcpdump -i any -w /tmp/proto-install.pcap \
            'host github.com or host objects.githubusercontent.com or host codeload.github.com' \
            -s 0 &
          echo $! > /tmp/tcpdump.pid
          sleep 1

      - name: Setup proto toolchain
        id: proto
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: false

      - name: Verify tools
        run: |
          zarf version
          go version
          moon --version
          terraform version
          kind version

      - name: Dump pcap on failure
        if: failure()
        run: |
          sudo kill "$(cat /tmp/tcpdump.pid)" 2>/dev/null || true
          sleep 2
          echo "--- PCAP START (base64) ---"
          base64 /tmp/proto-install.pcap
          echo "--- PCAP END ---"

      - name: Stop tcpdump on success
        if: success()
        run: sudo kill "$(cat /tmp/tcpdump.pid)" 2>/dev/null || true
