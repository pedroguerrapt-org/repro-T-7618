name = "sloth"
type = "cli"

[platform.linux]
download-file = "sloth-linux-{arch}"

[platform.macos]
download-file = "sloth-darwin-{arch}"

[install]
download-url = "https://github.com/slok/sloth/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[resolve]
git-url = "https://github.com/slok/sloth"
