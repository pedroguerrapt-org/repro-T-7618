name = "kind"
type = "cli"

[platform.linux]
download-file = "kind-linux-{arch}"

[platform.macos]
download-file = "kind-darwin-{arch}"

[install]
download-url = "https://github.com/kubernetes-sigs/kind/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[resolve]
git-url = "https://github.com/kubernetes-sigs/kind"
