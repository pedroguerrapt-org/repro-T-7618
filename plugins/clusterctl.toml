name = "clusterctl"
type = "cli"

[platform.linux]
download-file = "clusterctl-linux-{arch}"

[platform.macos]
download-file = "clusterctl-darwin-{arch}"

[install]
download-url = "https://github.com/kubernetes-sigs/cluster-api/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[resolve]
git-url = "https://github.com/kubernetes-sigs/cluster-api"
